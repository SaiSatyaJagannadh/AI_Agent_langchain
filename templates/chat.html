<!DOCTYPE html>
<html>
<head>
    <title>Weather Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .chat-box {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
        }

        .message {
            margin: 15px 0;
            padding: 10px 15px;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .user {
            background-color: #007bff;
            color: white;
            text-align: right;
        }

        .agent {
            background-color: #e9ecef;
            color: #333;
        }

        .input-form {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .clear-btn {
            background-color: #6c757d;
            width: 100%;
        }

        .clear-btn:hover {
            background-color: #5a6268;
        }

        .location-status {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>🌤️ Weather Assistant</h1>

    <div class="location-status" id="locationStatus">
        Detecting your location...
    </div>

    <div class="chat-box" id="chatBox">

        {% if messages %}

            {% for msg in messages %}

                {% if msg.type == 'human' %}
                    <div class="message user">
                        {{ msg.content }}
                    </div>
                {% endif %}

                {% if msg.type == 'ai' %}
                    <div class="message agent">
                        {{ msg.content }}
                    </div>
                {% endif %}

            {% endfor %}

        {% else %}

            <p style="text-align:center;color:#888;">
                Ask me about the weather!
            </p>

        {% endif %}

    </div>

    <form method="POST" action="/send" class="input-form" id="chatForm">

        <!-- Hidden location fields -->
        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">

        <input
            type="text"
            name="message"
            placeholder="Ask about weather..."
            autocomplete="off"
            required
        >

        <button type="submit">
            Send
        </button>

    </form>

    <a href="/clear">
        <button type="button" class="clear-btn">
            New Conversation
        </button>
    </a>

    <script>

        // Auto-scroll chat to bottom
        const chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;

        const statusDiv = document.getElementById("locationStatus");

        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(

                function(position) {

                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    document.getElementById("latitude").value = lat;
                    document.getElementById("longitude").value = lon;

                    statusDiv.innerHTML =
                        "📍 Location detected successfully";

                    console.log("Latitude:", lat);
                    console.log("Longitude:", lon);
                },

                function(error) {

                    console.log("Location error:", error);

                    statusDiv.innerHTML =
                        "⚠️ Location access denied. Weather queries may require a city name.";
                }

            );

        } else {

            statusDiv.innerHTML =
                "⚠️ Geolocation is not supported by this browser.";

        }

    </script>

</body>
</html>
